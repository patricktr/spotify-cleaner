name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      # Dummy build-time env: the build only needs these present, it never
      # connects to any service, so no real secrets are required in CI.
      - run: pnpm run build
        env:
          POSTGRES_URL: postgresql://u:p@localhost:5432/db
          POSTGRES_URL_NON_POOLING: postgresql://u:p@localhost:5432/db
          TOKEN_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc
          ADMIN_PASSWORD: dummy-pw
          CRON_SECRET: dummy-cron
          SPOTIFY_CLIENT_ID: dummy
          SPOTIFY_CLIENT_SECRET: dummy
          SPOTIFY_REDIRECT_URI: http://localhost:3000/api/spotify/callback
